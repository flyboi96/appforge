<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AppForge</title>
  <desc id="desc">Purple forge flames behind a hammer striking an APP ingot.</desc>
  <defs>
    <linearGradient id="bg" x1="68" x2="440" y1="36" y2="474" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#190033" />
      <stop offset=".48" stop-color="#4b148f" />
      <stop offset="1" stop-color="#12001f" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="58%" r="52%">
      <stop offset="0" stop-color="#ff71ff" stop-opacity=".72" />
      <stop offset=".5" stop-color="#8438ff" stop-opacity=".34" />
      <stop offset="1" stop-color="#1a0030" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="flameA" x1="128" x2="180" y1="410" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b0a8f" />
      <stop offset=".45" stop-color="#9b35ff" />
      <stop offset="1" stop-color="#f2dbff" />
    </linearGradient>
    <linearGradient id="flameB" x1="320" x2="356" y1="430" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21005d" />
      <stop offset=".5" stop-color="#7d2cff" />
      <stop offset="1" stop-color="#ff66e8" />
    </linearGradient>
    <linearGradient id="flameC" x1="244" x2="272" y1="450" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a0068" />
      <stop offset=".55" stop-color="#b833ff" />
      <stop offset="1" stop-color="#ffe1ff" />
    </linearGradient>
    <linearGradient id="metal" x1="124" x2="388" y1="300" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff7d5" />
      <stop offset=".36" stop-color="#ffd166" />
      <stop offset=".72" stop-color="#f78c28" />
      <stop offset="1" stop-color="#ba3f1d" />
    </linearGradient>
    <linearGradient id="hammerHead" x1="248" x2="402" y1="90" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f1ff" />
      <stop offset=".45" stop-color="#a8a2c8" />
      <stop offset="1" stop-color="#4b4663" />
    </linearGradient>
    <linearGradient id="handle" x1="205" x2="338" y1="150" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd08a" />
      <stop offset=".55" stop-color="#8c4b2f" />
      <stop offset="1" stop-color="#3c1f26" />
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#08000f" flood-opacity=".42" />
    </filter>
    <filter id="sparkGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <circle cx="256" cy="286" r="238" fill="url(#glow)" />

  <g opacity=".94">
    <path d="M122 434c-48-59-34-118 3-175 24-37 35-76 21-123 58 42 81 89 66 140-10 35-2 57 23 82 29 30 29 60-1 92-40 17-78 11-112-16Z" fill="url(#flameA)" />
    <path d="M341 438c55-48 54-105 25-166-22-46-21-84 11-135-72 32-113 89-97 150 8 33-4 58-34 83-33 28-36 58-9 86 34 12 69 6 104-18Z" fill="url(#flameB)" />
    <path d="M246 456c-73-54-75-126-30-198 24-39 35-79 20-122 79 48 105 112 78 181-15 38-3 62 29 92 19 18 20 36 2 52-32 16-65 14-99-5Z" fill="url(#flameC)" />
    <path d="M258 432c-38-33-38-73-12-115 17-27 22-52 12-78 48 31 62 67 43 105-10 20-3 36 18 55 17 16 14 35-6 44-20 9-39 5-55-11Z" fill="#ffd8ff" opacity=".82" />
  </g>

  <g filter="url(#shadow)">
    <path d="M132 314c5-24 28-40 52-36l172 30c22 4 37 24 34 46l-8 54c-4 25-28 42-53 37l-176-34c-23-4-38-27-33-50l12-47Z" fill="url(#metal)" />
    <path d="M156 320c3-12 15-20 27-18l152 26c12 2 20 13 18 25l-5 31c-2 13-14 22-27 19l-154-29c-13-2-21-15-18-27l7-27Z" fill="#2c1449" opacity=".18" />
    <text x="256" y="382" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" letter-spacing="5" text-anchor="middle" transform="rotate(10 256 360)">APP</text>
  </g>

  <g filter="url(#shadow)" transform="rotate(-38 304 215)">
    <rect x="280" y="136" width="42" height="202" rx="18" fill="url(#handle)" />
    <rect x="222" y="92" width="148" height="74" rx="18" fill="url(#hammerHead)" />
    <rect x="236" y="105" width="120" height="18" rx="9" fill="#ffffff" opacity=".42" />
    <rect x="213" y="111" width="28" height="36" rx="8" fill="#ded8ee" />
    <rect x="354" y="111" width="30" height="36" rx="8" fill="#5e5874" />
  </g>

  <g fill="#ffe36e" filter="url(#sparkGlow)">
    <path d="M140 271h16l-13 10 5 16-13-10-13 10 5-16-13-10h16l5-15 5 15Z" />
    <path d="M372 254h13l-10 8 4 13-10-8-11 8 4-13-10-8h13l4-12 3 12Z" />
    <path d="M321 422h12l-9 7 3 12-9-7-10 7 4-12-10-7h12l4-11 3 11Z" />
    <circle cx="111" cy="348" r="6" />
    <circle cx="408" cy="360" r="5" />
  </g>

  <rect x="18" y="18" width="476" height="476" rx="96" fill="none" stroke="#ffffff" stroke-opacity=".16" stroke-width="10" />
</svg>
